name: Validate TORI-QMD Frontmatter

on:
  push:
    paths:
      - '**/*.md'
  pull_request:
    paths:
      - '**/*.md'

jobs:
  validate-tori-qmd:
    name: TORI-QMD Frontmatter Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Find and validate all Markdown files
        run: |
          set -e
          FAIL=0
          while IFS= read -r -d '' file; do
            result=$(python3 scripts/validate-tori-qmd.py "$file" 2>&1)
            echo "$result"
            if echo "$result" | grep -q "^FAIL:"; then
              FAIL=1
            fi
          done < <(find . -name "*.md" \
            -not -path "./.git/*" \
            -not -path "*/node_modules/*" \
            -print0)

          if [ "$FAIL" -eq 1 ]; then
            echo ""
            echo "❌ TORI-QMD validation failed. Fix the missing fields listed above."
            echo "   All .md files in the ONXZA repo require proper frontmatter."
            echo "   See docs/governance/knowledge-base-governance.md for the spec."
            exit 1
          else
            echo ""
            echo "✅ All Markdown files passed TORI-QMD validation."
          fi

      - name: Summary
        if: always()
        run: |
          echo "TORI-QMD validation complete."
          echo "Every .md file must include valid frontmatter or credit line per the ONXZA standard."
